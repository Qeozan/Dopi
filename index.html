<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tabs UI</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg-1: #0a0a0f;
  --bg-2: #12121a;
  --panel: rgba(255, 255, 255, 0.05);
  --panel-strong: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.12);
  --border-active: rgba(255, 255, 255, 0.28);
  --text: #f3f3f7;
  --muted: #a4a4b3;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text);
  background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
}

.site {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* TOP TABS */

.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  margin-bottom: 20px;
}

.topbar-inner {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
}

.tab-btn {
  padding: 10px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
}

.tab-btn.active {
  background: var(--panel-strong);
  border-color: var(--border-active);
}

/* CONTENT */

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.panel {
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 20px;
}

.placeholder {
  padding: 40px;
  border: 1px dashed var(--border);
  text-align: center;
  color: var(--muted);
}

/* SUB TABS */

.sub-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 20px;
}

.sub-tabs {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sub-btn {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
}

.sub-btn.active {
  background: var(--panel-strong);
  border-color: var(--border-active);
}

.sub-panel {
  display: none;
}

.sub-panel.active {
  display: block;
}

.sub-panel img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="site">

  <!-- TOP MENU -->
  <div class="topbar">
    <div class="topbar-inner">
      <button class="tab-btn active" data-tab="tab1">I</button>
      <button class="tab-btn" data-tab="tab2">II</button>
      <button class="tab-btn" data-tab="tab3">III</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="tab1" class="tab-panel active">
    <div class="panel">
      <div class="placeholder">Контент первой вкладки</div>
    </div>
  </div>

  <div id="tab2" class="tab-panel">
    <div class="panel">
      <div class="placeholder">Контент второй вкладки</div>
    </div>
  </div>

  <div id="tab3" class="tab-panel">
    <div class="panel">

      <div class="sub-layout">

        <!-- LEFT MENU -->
        <div class="sub-tabs">
          <button class="sub-btn active" data-sub="s1">Item 1</button>
          <button class="sub-btn" data-sub="s2">Item 2</button>
          <button class="sub-btn" data-sub="s3">Item 3</button>
          <button class="sub-btn" data-sub="s4">Item 4</button>
          <button class="sub-btn" data-sub="s5">Item 5</button>
          <button class="sub-btn" data-sub="s6">Item 6</button>
          <button class="sub-btn" data-sub="s7">Item 7</button>
          <button class="sub-btn" data-sub="s8">Item 8</button>
        </div>

        <!-- RIGHT CONTENT -->
        <div>

          <div id="s1" class="sub-panel active">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 1</p>
          </div>

          <div id="s2" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 2</p>
          </div>

          <div id="s3" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 3</p>
          </div>

          <div id="s4" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 4</p>
          </div>

          <div id="s5" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 5</p>
          </div>

          <div id="s6" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 6</p>
          </div>

          <div id="s7" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 7</p>
          </div>

          <div id="s8" class="sub-panel">
            <img src="https://via.placeholder.com/400">
            <p>Описание Item 8</p>
          </div>

        </div>

      </div>

    </div>
  </div>

</div>

<script>

/* MAIN TABS */
const tabButtons = document.querySelectorAll(".tab-btn");
const tabPanels = document.querySelectorAll(".tab-panel");

tabButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    tabButtons.forEach(b => b.classList.remove("active"));
    tabPanels.forEach(p => p.classList.remove("active"));

    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

/* SUB TABS */
const subButtons = document.querySelectorAll(".sub-btn");
const subPanels = document.querySelectorAll(".sub-panel");

subButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    subButtons.forEach(b => b.classList.remove("active"));
    subPanels.forEach(p => p.classList.remove("active"));

    btn.classList.add("active");
    document.getElementById(btn.dataset.sub).classList.add("active");
  });
});

</script>

</body>
</html>
