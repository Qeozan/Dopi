<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three Tabs</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #0a0a0f;
      --bg-2: #12121a;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --border-active: rgba(255, 255, 255, 0.28);
      --text: #f3f3f7;
      --muted: #a4a4b3;
      --glow: 0 0 30px rgba(255, 255, 255, 0.06);
      --radius: 24px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1b1b27 0%, transparent 35%),
        radial-gradient(circle at top right, #161622 0%, transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .site {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding-top: 6px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(-25px);
      pointer-events: none;
      transition: 0.5s ease;
    }

    .topbar.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .topbar-inner {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      background: rgba(10, 10, 15, 0.72);
      backdrop-filter: blur(14px);
      border-radius: 999px;
      box-shadow: var(--glow);
      width: fit-content;
      margin: 0 auto;
    }

    .hero {
      min-height: 68vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: min-height 0.6s ease, padding 0.6s ease;
    }

    .hero.compact {
      min-height: 0;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .center-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      transition: 0.6s ease;
    }

    .intro {
      text-align: center;
      transition: 0.4s ease;
    }

    .intro.hide {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
    }

    .intro h1 {
      margin: 0 0 10px;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tabs-start {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      transition: transform 0.7s ease, opacity 0.45s ease;
    }

    .tabs-start.fly-up {
      transform: translateY(-80px) scale(0.92);
      opacity: 0;
      pointer-events: none;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 20px;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(12px);
    }

    .tab-btn.large {
      min-width: 180px;
      padding: 30px 34px;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 0.18em;
      box-shadow: var(--glow);
    }

    .tab-btn.small {
      min-width: 84px;
      padding: 12px 18px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
      background: var(--panel-strong);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .tab-btn.active {
      background: rgba(255, 255, 255, 0.11);
      border-color: var(--border-active);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 10px 30px rgba(0,0,0,0.25),
        0 0 25px rgba(255,255,255,0.08);
    }

    .content {
      opacity: 0;
      transform: translateY(20px);
      transition: 0.45s ease;
      pointer-events: none;
    }

    .content.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .panel {
      border: 1px solid var(--border);
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.03)
      );
      border-radius: 28px;
      padding: 28px;
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .panel-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .panel-mark {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.25em;
    }

    .placeholder {
      min-height: 260px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.03),
          rgba(255,255,255,0.015)
        );
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    .stack {
      display: grid;
      gap: 20px;
    }

    .tab-panel {
      display: none;
      animation: fadeIn 0.35s ease;
    }

    .tab-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .intro h1 {
        font-size: 42px;
      }

      .tab-btn.large {
        min-width: 140px;
        font-size: 32px;
        padding: 24px 26px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .site {
        padding-left: 14px;
        padding-right: 14px;
      }

      .intro h1 {
        font-size: 34px;
      }

      .tabs-start {
        width: 100%;
        flex-direction: column;
      }

      .tab-btn.large,
      .tab-btn.small {
        width: 100%;
      }

      .topbar-inner {
        width: 100%;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <div id="topbar" class="topbar">
      <div class="topbar-inner">
        <button class="tab-btn small active" data-tab="tab1">I</button>
        <button class="tab-btn small" data-tab="tab2">II</button>
        <button class="tab-btn small" data-tab="tab3">III</button>
      </div>
    </div>

    <section id="hero" class="hero">
      <div class="center-wrap">
        <div id="intro" class="intro">
          <h1>MENU</h1>
          <p>выбери раздел</p>
        </div>

        <div id="startTabs" class="tabs-start">
          <button class="tab-btn large active" data-tab="tab1">I</button>
          <button class="tab-btn large" data-tab="tab2">II</button>
          <button class="tab-btn large" data-tab="tab3">III</button>
        </div>
      </div>
    </section>

    <section id="content" class="content">
      <div id="tab1" class="tab-panel active">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">SECTION I</h2>
            <div class="panel-mark">I</div>
          </div>
          <div class="grid">
            <div class="placeholder">Поле под основной контент</div>
            <div class="stack">
              <div class="placeholder">Поле 1</div>
              <div class="placeholder">Поле 2</div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab2" class="tab-panel">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">SECTION II</h2>
            <div class="panel-mark">II</div>
          </div>
          <div class="placeholder">Большое поле под контент</div>
        </div>
      </div>

      <div id="tab3" class="tab-panel">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">SECTION III</h2>
            <div class="panel-mark">III</div>
          </div>
          <div class="grid">
            <div class="placeholder">Левое поле</div>
            <div class="placeholder">Правое поле</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const startTabs = document.getElementById("startTabs");
    const topbar = document.getElementById("topbar");
    const hero = document.getElementById("hero");
    const intro = document.getElementById("intro");
    const content = document.getElementById("content");

    const allButtons = document.querySelectorAll("[data-tab]");
    const panels = document.querySelectorAll(".tab-panel");

    let firstOpen = true;

    function setActive(tabId) {
      allButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tabId);
      });

      panels.forEach(panel => {
        panel.classList.toggle("active", panel.id === tabId);
      });
    }

    function openTab(tabId) {
      setActive(tabId);

      if (firstOpen) {
        firstOpen = false;

        startTabs.classList.add("fly-up");
        intro.classList.add("hide");
        hero.classList.add("compact");

        setTimeout(() => {
          topbar.classList.add("show");
          content.classList.add("show");
        }, 260);
      }
    }

    allButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        openTab(btn.dataset.tab);
      });
    });
  </script>
</body>
</html>
